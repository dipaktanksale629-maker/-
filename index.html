<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - डॉ. रवींद्र घोंगडे</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 8px solid #1a73e8; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: #1a73e8; margin: 0; font-size: 22px; }
        label { font-weight: bold; display: block; margin-top: 12px; color: #333; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #dfe1e5; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: #1a73e8; color: white; width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: #dc3545; margin-bottom: 10px; font-size: 13px; }
        .tabs { display: flex; gap: 5px; margin-top: 20px; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 12px; }
        .active-tab { color: #1a73e8; border-bottom: 3px solid #1a73e8; }
        .list-section { display: none; margin-top: 15px; }
        .active-section { display: block; }
        .patient-card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; position: relative; border-left: 5px solid #1a73e8; }
        .checked-patient { opacity: 0.5; text-decoration: line-through; background: #f9f9f9; }
        .btn-wa-sm { background: #25D366; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; margin-top: 5px; font-weight: bold; cursor: pointer; }
        .btn-check { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; margin-top: 8px; }
        .preview-img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏥 साईदत्त क्लिनिक</h1>
        <p>डॉ. रवींद्र घोंगडे</p>
    </div>

    <div id="formSection">
        <label>पेशंटचे नाव:</label>
        <input type="text" id="name" placeholder="नाव">
        <label>मोबाईल नंबर:</label>
        <input type="number" id="phone" placeholder="9284XXXXXX">
        <div style="display:flex; gap:5px;">
            <div style="flex:1;"><label>तारीख:</label><input type="date" id="apt_date"></div>
            <div style="flex:1;"><label>वेळ:</label><input type="time" id="apt_time"></div>
        </div>
        <label>फॉलो-अप तारीख:</label>
        <input type="date" id="fup_date">
        <label>प्रिस्क्रिप्शन फोटो:</label>
        <input type="file" id="photo" accept="image/*" onchange="previewFile()">
        <img id="imgPreview" class="preview-img">
        <label>नोट्स:</label>
        <textarea id="symptoms" rows="2"></textarea>
        <button class="btn-main" onclick="saveData()" style="background:#28a745; font-size:18px;">💾 सेव्ह आणि मेसेज</button>
    </div>

    <div class="tabs">
        <div class="tab active-tab" onclick="switchTab(this, 'dateWise')">तारीखवार</div>
        <div class="tab" onclick="switchTab(this, 'reminderTab')">🔔 रिमाइन्डर्स</div>
        <div class="tab" onclick="switchTab(this, 'broadcastTab')">📢 ब्रॉडकास्ट</div>
    </div>

    <div id="dateWise" class="list-section active-section">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
            <input type="date" id="filterDate" onchange="renderDateWise()" style="flex:1; background:#e8f0fe;">
            <button class="btn-main btn-pdf" onclick="downloadPDF()" style="width:auto; margin:0; padding:10px;">📥 PDF</button>
        </div>
        <div id="dateContent"></div>
    </div>

    <div id="reminderTab" class="list-section"><div id="reminderContent"></div></div>
    <div id="broadcastTab" class="list-section">
        <textarea id="bcMsg" rows="3" placeholder="मेसेज लिहा..."></textarea>
        <div id="bcContent"></div>
    </div>
</div>

<script>
    let currentImgBase64 = "";
    document.getElementById('apt_date').valueAsDate = new Date();
    document.getElementById('filterDate').valueAsDate = new Date();

    function previewFile() {
        const file = document.getElementById('photo').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { currentImgBase64 = reader.result; document.getElementById('imgPreview').src = reader.result; document.getElementById('imgPreview').style.display = "block"; }
        if (file) reader.readAsDataURL(file);
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.list-section').forEach(s => s.classList.remove('active-section'));
        el.classList.add('active-tab');
        document.getElementById(id).classList.add('active-section');
        if(id === 'dateWise') renderDateWise();
        if(id === 'reminderTab') renderReminders();
        if(id === 'broadcastTab') renderBroadcast();
    }

    function saveData() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if(!name || !phone) return alert("नाव आणि नंबर भरा!");
        const patient = { id: Date.now(), name, phone, apt_date: document.getElementById('apt_date').value, apt_time: document.getElementById('apt_time').value, fup_date: document.getElementById('fup_date').value, symptoms: document.getElementById('symptoms').value, photo: currentImgBase64, checked: false };
        let db = JSON.parse(localStorage.getItem('saidatt_final_db')) || [];
        db.push(patient);
        localStorage.setItem('saidatt_final_db', JSON.stringify(db));
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent('नमस्कार ' + name + ', आपली अपॉइंटमेंट बुक झाली आहे. - साईदत्त क्लिनिक')}`, '_blank');
        location.reload();
    }

    function renderDateWise() {
        const selDate = document.getElementById('filterDate').value;
        const container = document.getElementById('dateContent');
        let db = JSON.parse(localStorage.getItem('saidatt_final_db')) || [];
        const filtered = db.filter(p => p.apt_date === selDate);
        container.innerHTML = filtered.length ? "" : "<p>ह्या तारखेला डेटा नाही.</p>";
        filtered.forEach((p, i) => {
            container.innerHTML += `
                <div class="patient-card ${p.checked ? 'checked-patient' : ''}">
                    <b>${i+1}. ${p.name}</b><br><small>⏰ ${p.apt_time} | 📞 ${p.phone}</small>
                    <p style="font-size:13px; margin:5px 0;">${p.symptoms}</p>
                    ${p.photo ? `<img src="${p.photo}" style="width:80px; border-radius:5px;">` : ""}
                    <br><button class="btn-check" onclick="toggleCheck(${p.id})">${p.checked ? '✅ तपासले' : '☑️ चेक'}</button>
                    <button onclick="deleteRec(${p.id})" style="color:red; background:none; border:none; float:right; cursor:pointer;">Delete</button>
                </div>`;
        });
    }

    function downloadPDF() {
        const element = document.getElementById('dateContent');
        const date = document.getElementById('filterDate').value;
        if(!element.innerText || element.innerText.includes("डेटा नाही")) return alert("डाउनलोड करण्यासाठी डेटा नाही!");
        const opt = { margin: 10, filename: `Patient_Report_${date}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    function toggleCheck(id) {
        let db = JSON.parse(localStorage.getItem('saidatt_final_db')) || [];
        db = db.map(p => p.id === id ? { ...p, checked: !p.checked } : p);
        localStorage.setItem('saidatt_final_db', JSON.stringify(db));
        renderDateWise();
    }

    function deleteRec(id) { if(confirm("डिलीट करायचे?")) { let db = JSON.parse(localStorage.getItem('saidatt_final_db')) || []; localStorage.setItem('saidatt_final_db', JSON.stringify(db.filter(x => x.id !== id))); renderDateWise(); } }

    function renderReminders() { /* Same as previous version */ }
    function renderBroadcast() { /* Same as previous version */ }

    renderDateWise();
</script>
</body>
</html>
