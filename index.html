<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्ता मल्टी-क्लिनिक सॉफ्टवेअर</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .login-screen { position: fixed; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .container { display: none; max-width: 500px; margin: auto; padding: 20px; background: white; min-height: 100vh; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; }
        .btn-save { background: var(--secondary); }
        .btn-login { background: var(--primary); }
        .hidden { display: none; }
        .patient-card { border: 1px solid #eee; padding: 15px; margin-top: 10px; border-radius: 12px; position: relative; border-left: 5px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="login-box">
        <h2 style="color: var(--primary);">🏥 क्लिनिक लॉगिन</h2>
        <input type="email" id="userEmail" placeholder="तुमचा ईमेल आयडी">
        <input type="password" id="userPass" placeholder="पासवर्ड">
        <button class="btn btn-login" onclick="login()">प्रवेश करा</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">Admin द्वारे दिलेला आयडी वापरा.</p>
    </div>
</div>

<div id="appPage" class="container">
    <div class="header">
        <h3 id="clinicTitle" style="margin:0;">क्लिनिक नाव</h3>
        <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold;">Logout</button>
    </div>

    <div id="formSection" style="margin-top:20px;">
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="मोबाईल नंबर">
        <input type="date" id="pDate">
        <textarea id="pNotes" placeholder="तपासणी नोट्स (औषधे, लक्षणे)"></textarea>
        <button class="btn btn-save" onclick="saveData()">💾 डेटा क्लाउडवर सेव्ह करा</button>
    </div>

    <div style="margin-top:30px;">
        <h4>आजचे पेशंट:</h4>
        <input type="date" id="filterDate" onchange="loadData()">
        <div id="listDisplay" style="margin-top:15px;">माहिती लोड होत आहे...</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_pDiZPZFfnUvlRGFxEj6B2uKuWgHIj4S4BbFw_y4c103HQqIK97wUkhR6rQ2FIKvrmQ/exec";

    // १. लॉगिन सिस्टीम (तुम्ही इथे नवीन युजर्स वाढवू शकता)
    function login() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;

        const users = {
            "sai@gmail.com": "sai123",
            "test@gmail.com": "123"
        };

        if (users[email] && users[email] === pass) {
            localStorage.setItem("clinic_user", email);
            startApp();
        } else {
            alert("चुकीचा ईमेल किंवा पासवर्ड!");
        }
    }

    function startApp() {
        const user = localStorage.getItem("clinic_user");
        if (user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('clinicTitle').innerText = user.split('@')[0].toUpperCase();
            document.getElementById('pDate').valueAsDate = new Date();
            document.getElementById('filterDate').valueAsDate = new Date();
            loadData();
        }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // २. डेटा सेव्ह करणे
    async function saveData() {
        const userId = localStorage.getItem("clinic_user");
        const data = {
            action: "save",
            userId: userId,
            id: Date.now(),
            name: document.getElementById('pName').value,
            phone: document.getElementById('pPhone').value,
            date: document.getElementById('pDate').value,
            notes: document.getElementById('pNotes').value
        };

        if(!data.name) { alert("नाव भरणे आवश्यक आहे!"); return; }

        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });

        alert("डेटा यशस्वीरित्या सेव्ह झाला!");
        document.getElementById('pName').value = "";
        document.getElementById('pPhone').value = "";
        document.getElementById('pNotes').value = "";
        loadData();
    }

    // ३. डेटा लोड करणे (फक्त स्वतःचा)
    async function loadData() {
        const userId = localStorage.getItem("clinic_user");
        const filterDate = document.getElementById('filterDate').value;
        const display = document.getElementById('listDisplay');
        display.innerHTML = "लोड होत आहे...";

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
            const allData = await resp.json();
            
            const filtered = allData.filter(item => item.date === filterDate);
            
            display.innerHTML = filtered.length ? "" : "या तारखेला पेशंट नाहीत.";
            filtered.forEach(p => {
                display.innerHTML += `
                    <div class="patient-card">
                        <b>${p.name}</b> (${p.phone})<br>
                        <small>${p.notes || 'No notes'}</small>
                    </div>`;
            });
        } catch (e) {
            display.innerHTML = "डेटा लोड करताना एरर आली.";
        }
    }

    window.onload = startApp;
</script>
</body>
</html>
