<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-2xl shadow-xl border-t-4 border-blue-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-700"><i class="fas fa-clinic-medical"></i> साईदत्त क्लिनिक</h1>
            <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-bold">
                एकूण पेशंट: <span id="patientCount">0</span>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="number" id="pPhone" placeholder="WhatsApp नंबर" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="text" id="pAddress" placeholder="गाव/पत्ता" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            
            <div class="flex flex-col">
                <label class="text-xs text-gray-500 ml-1">तपासणी तारीख</label>
                <input type="date" id="pDate" class="p-3 border rounded-lg">
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-gray-500 ml-1">फॉलो-अप तारीख (Next Visit)</label>
                <input type="date" id="fDate" class="p-3 border rounded-lg border-orange-300">
            </div>
            
            <textarea id="pNotes" placeholder="आजची लक्षणे / औषधे" class="p-3 border rounded-lg md:col-span-1"></textarea>
            
            <button onclick="saveData()" id="saveBtn" class="bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 md:col-span-3 font-bold shadow-md transition-all">
                <i class="fas fa-check-circle"></i> बुकिंग कन्फर्म करा आणि WhatsApp पाठवा
            </button>
        </div>

        <hr class="my-6">

        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="loadData()" class="bg-gray-200 px-4 py-2 rounded-md hover:bg-gray-300"><i class="fas fa-sync"></i> रिफ्रेश</button>
            <button onclick="sendBroadcast()" class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700"><i class="fab fa-whatsapp"></i> सर्वांना ब्रॉडकास्ट</button>
        </div>

        <div class="overflow-x-auto shadow-inner border rounded-lg">
            <table class="w-full text-left">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="p-3">नाव</th>
                        <th class="p-3">संपर्क</th>
                        <th class="p-3">तारीख / फॉलो-अप</th>
                        <th class="p-3">ॲक्शन</th>
                    </tr>
                </thead>
                <tbody id="patientTable" class="divide-y">
                    <tr><td colspan="4" class="p-10 text-center text-gray-400">माहिती लोड होत आहे...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxfs80OWebQJBjih3OR_UlK50fWBhqyY-IisWbLizflR35Pm7hW0Jhxgdt_AWZJjfAC/exec";

        // १. डेटा सेव्ह आणि WhatsApp पाठवणे
        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const data = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                address: document.getElementById('pAddress').value,
                date: document.getElementById('pDate').value,
                fdate: document.getElementById('fDate').value, // Follow up
                notes: document.getElementById('pNotes').value,
                time: new Date().toLocaleTimeString()
            };

            if (!data.name || !data.phone) {
                alert("नाव आणि नंबर आवश्यक आहे!"); return;
            }

            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> प्रोसेस होत आहे...";

            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
                
                // WhatsApp मेसेज तयार करा
                const msg = `नमस्ते ${data.name},\nतुमची साईदत्त क्लिनिकमध्ये नोंदणी झाली आहे.\nतारीख: ${data.date}\nपुढील फॉलो-अप: ${data.fdate || 'गरज नाही'}\nधन्यवाद!`;
                window.open(`https://wa.me/91${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
                
                alert("✅ बुकिंग कन्फर्म!");
                location.reload();
            } catch (e) {
                alert("डेटा सेव्ह झाला!"); location.reload();
            }
        }

        // २. डेटा लोड करणे आणि पेशंट काउंट
        async function loadData() {
            const tableBody = document.getElementById('patientTable');
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                tableBody.innerHTML = "";
                document.getElementById('patientCount').innerText = data.length;

                if (data.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='4' class='p-5 text-center'>आज रेकॉर्ड नाही.</td></tr>";
                    return;
                }

                data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-3 font-semibold">${row[0]}<br><span class="text-xs text-gray-400">${row[2]}</span></td>
                        <td class="p-3 text-blue-600 font-medium">${row[1]}</td>
                        <td class="p-3 text-sm">🗓️ ${row[3]}<br><span class="text-orange-600 font-bold">🎯 ${row[5] || 'NA'}</span></td>
                        <td class="p-3">
                            <button onclick="remind('${row[1]}', '${row[0]}', '${row[5]}')" class="bg-green-100 text-green-700 p-2 rounded-full hover:bg-green-200">
                                <i class="fab fa-whatsapp"></i> रिमांडर
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                tableBody.innerHTML = "<tr><td colspan='4' class='text-center p-5 text-red-500'>नेटवर्क एरर!</td></tr>";
            }
        }

        // ३. वैयक्तिक रिमांडर (Reminder)
        function remind(num, name, nextDate) {
            const msg = `नमस्ते ${name},\nसाईदत्त क्लिनिककडून आठवण: तुमची फॉलो-अप तारीख ${nextDate} आहे. कृपया वेळेवर यावे.`;
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ४. सर्वांना ब्रॉडकास्ट (Broadcast)
        function sendBroadcast() {
            alert("ब्रॉडकास्ट फिचर: तुम्ही गुगल शीटमधील सर्व नंबर्सना एका क्लिकवर मेसेज पाठवू शकता.");
        }

        window.onload = loadData;
    </script>
</body>
</html>
