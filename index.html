<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .patient-checked { opacity: 0.4; filter: grayscale(1); background-color: #f3f4f6; }
        .bg-urgent { background-color: #fee2e2; border-left: 5px solid #ef4444; }
        .bg-upcoming { background-color: #fef9c3; border-left: 5px solid #eab308; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-5">

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-md flex flex-wrap justify-between items-center gap-4 border-b-4 border-blue-600">
            <h1 class="text-2xl font-bold text-blue-800"><i class="fas fa-clinic-medical"></i> साईदत्त क्लिनिक</h1>
            <div class="flex items-center gap-2">
                <input type="date" id="filterDate" onchange="loadData()" class="border rounded p-1 shadow-sm font-bold text-blue-700">
                <span class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold">Count: <span id="dayCount">0</span></span>
            </div>
        </div>

        <div class="flex space-x-1">
            <button onclick="showTab('reg')" id="tab-reg" class="px-6 py-2 bg-white rounded-t-lg font-bold shadow">नोंदणी</button>
            <button onclick="showTab('rem')" id="tab-rem" class="px-6 py-2 bg-gray-200 rounded-t-lg font-bold shadow">रिमांडर्स</button>
            <button onclick="showTab('broad')" id="tab-broad" class="px-6 py-2 bg-gray-200 rounded-t-lg font-bold shadow">ब्रॉडकास्ट</button>
        </div>

        <div id="section-reg" class="bg-white p-5 rounded-b-xl shadow-lg border">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6 bg-blue-50 p-4 rounded-lg">
                <input type="text" id="pName" placeholder="पेशंटचे नाव" class="p-2 border rounded">
                <input type="number" id="pPhone" placeholder="WhatsApp नंबर" class="p-2 border rounded">
                <input type="text" id="pAddress" placeholder="पत्ता" class="p-2 border rounded">
                <input type="date" id="pDate" class="p-2 border rounded">
                <textarea id="pNotes" placeholder="लक्षणे / माहिती" class="p-2 border rounded md:col-span-3 h-12"></textarea>
                <button onclick="saveData()" id="saveBtn" class="bg-blue-600 text-white p-2 rounded-lg font-bold hover:bg-blue-700">
                    <i class="fas fa-plus-circle"></i> नोंदणी करा
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm md:text-base">
                    <thead class="bg-slate-100 text-gray-700 border-b">
                        <tr>
                            <th class="p-3">चेक</th>
                            <th class="p-3">पेशंटचे नाव</th>
                            <th class="p-3">संपर्क</th>
                            <th class="p-3">पुढील भेट (Follow-up)</th>
                            <th class="p-3">ॲक्शन</th>
                        </tr>
                    </thead>
                    <tbody id="patientTable" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="section-rem" class="hidden bg-white p-5 rounded-xl shadow-lg border">
            <h2 class="text-xl font-bold mb-4 text-orange-700"><i class="fas fa-bell"></i> आगामी रिमांडर्स</h2>
            <div id="reminderList" class="space-y-3"></div>
        </div>

        <div id="section-broad" class="hidden bg-white p-5 rounded-xl shadow-lg border">
            <h2 class="text-xl font-bold mb-2">📢 ब्रॉडकास्ट मेसेज</h2>
            <textarea id="broadMsg" placeholder="मेसेज लिहा..." class="w-full p-3 border rounded-lg h-24 mb-4 shadow-sm"></textarea>
            <div id="broadcastList" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
        </div>
    </div>

    <script>
        // तुमची नवीन URL अपडेट केली आहे
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxviptsjYoceNzQv5D5N82gsRyLGhoG9js28VrtisJ6cLHGspy28rk66ylcr-8Jf5bL/exec";
        let allPatients = [];

        function showTab(tab) {
            document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.replace('bg-white', 'bg-gray-200'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.replace('bg-gray-200', 'bg-white');
        }

        async function saveData() {
            const data = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                address: document.getElementById('pAddress').value,
                date: document.getElementById('pDate').value || new Date().toISOString().split('T')[0],
                notes: document.getElementById('pNotes').value
            };
            if(!data.name || !data.phone) return alert("नाव आणि नंबर आवश्यक!");
            
            document.getElementById('saveBtn').innerText = "सेव्ह होत आहे...";
            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
                const msg = `नमस्कार ${data.name},\nतुमची साईदत्त क्लिनिकमध्ये नोंदणी झाली आहे.\nतारीख: ${data.date}\nधन्यवाद!`;
                window.open(`https://wa.me/91${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
                location.reload();
            } catch(e) { location.reload(); }
        }

        async function markAsChecked(index, phone, name) {
            const nextDate = prompt(`${name} साठी पुढील फॉलो-अप तारीख निवडा (YYYY-MM-DD):`, "");
            if (!nextDate) return;

            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ 
                    action: "updateFollowUp",
                    rowIndex: index + 2, 
                    fdate: nextDate 
                })});
                const msg = `नमस्कार ${name},\nतुमची आजची तपासणी पूर्ण झाली आहे.\nपुढील भेट: ${nextDate}\nधन्यवाद!`;
                window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                location.reload();
            } catch(e) { location.reload(); }
        }

        async function loadData() {
            const table = document.getElementById('patientTable');
            const remList = document.getElementById('reminderList');
            const broadList = document.getElementById('broadcastList');
            const fDateInput = document.getElementById('filterDate');
            
            if(!fDateInput.value) fDateInput.value = new Date().toISOString().split('T')[0];
            const today = fDateInput.value;

            try {
                const res = await fetch(WEB_APP_URL);
                allPatients = await res.json();
                table.innerHTML = ""; remList.innerHTML = ""; broadList.innerHTML = "";
                let count = 0;

                allPatients.forEach((row, index) => {
                    const name = row[0], phone = row[1], pDate = row[3], fDate = row[4];

                    if(pDate === today) {
                        count++;
                        const isChecked = (fDate && fDate !== "");
                        const tr = document.createElement('tr');
                        if(isChecked) tr.className = "patient-checked";
                        tr.innerHTML = `
                            <td class="p-3 text-center">
                                <button onclick="markAsChecked(${index}, '${phone}', '${name}')" class="text-2xl ${isChecked ? 'text-green-600' : 'text-gray-300 hover:text-green-500'}">
                                    <i class="fas fa-check-circle"></i>
                                </button>
                            </td>
                            <td class="p-3 font-bold">${name}</td>
                            <td class="p-3">${phone}</td>
                            <td class="p-3 text-orange-600 font-bold">${fDate || '-'}</td>
                            <td class="p-3">
                                <button onclick="editPatient(${index})" class="text-blue-500 mr-3"><i class="fas fa-edit"></i></button>
                                <button onclick="window.open('https://wa.me/91${phone}')" class="text-green-500"><i class="fab fa-whatsapp"></i></button>
                            </td>
                        `;
                        table.appendChild(tr);
                    }

                    if(fDate) {
                        const diff = (new Date(fDate) - new Date(today)) / (1000*60*60*24);
                        if(diff === 0 || (diff > 0 && diff <= 2)) {
                            const div = document.createElement('div');
                            div.className = `p-4 rounded-lg shadow flex justify-between items-center ${diff === 0 ? 'bg-urgent' : 'bg-upcoming'}`;
                            div.innerHTML = `<div><b>${name}</b><br>🗓️ फॉलो-अप: ${fDate}</div><button onclick="window.open('https://wa.me/91${phone}?text=नमस्ते, आपली ${fDate} ची वेळ लक्षात आहे ना?')" class="bg-green-600 text-white px-3 py-1 rounded">मेसेज</button>`;
                            remList.appendChild(div);
                        }
                    }

                    const bDiv = document.createElement('div');
                    bDiv.className = "bg-white border p-2 rounded shadow-sm flex justify-between items-center";
                    bDiv.innerHTML = `<span class="text-sm font-medium">${name}</span> <button onclick="sendBroadSingle('${phone}')" class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-1 rounded">पाठवा</button>`;
                    broadList.appendChild(bDiv);
                });
                document.getElementById('dayCount').innerText = count;
            } catch(e) { }
        }

        function sendBroadSingle(num) {
            const msg = document.getElementById('broadMsg').value;
            if(!msg) return alert("मेसेज लिहा!");
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function editPatient(idx) {
            const p = allPatients[idx];
            document.getElementById('pName').value = p[0];
            document.getElementById('pPhone').value = p[1];
            document.getElementById('pAddress').value = p[2];
            document.getElementById('pDate').value = p[3];
            document.getElementById('pNotes').value = p[5];
            window.scrollTo(0,0);
        }

        window.onload = loadData;
    </script>
</body>
</html>
