<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - डॉ. रवींद्र घोंगडे</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 8px solid #1a73e8; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: #1a73e8; margin: 0; font-size: 22px; }
        .count-badge { background: #e8f0fe; color: #1a73e8; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: inline-block; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #333; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #dfe1e5; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: #28a745; color: white; width: 100%; margin-top: 15px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; }
        .tabs { display: flex; gap: 5px; margin-top: 20px; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 12px; }
        .active-tab { color: #1a73e8; border-bottom: 3px solid #1a73e8; }
        .list-section { display: none; margin-top: 15px; }
        .active-section { display: block; }
        .patient-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; border-left: 6px solid #1a73e8; position: relative; }
        .token-no { background: #1a73e8; color: white; width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; margin-right: 8px; vertical-align: middle; }
        .checked-patient { opacity: 0.4; background-color: #f2f2f2; border-left-color: #28a745; }
        .fup-row { display: flex; gap: 5px; margin-top: 10px; align-items: center; }
        .fup-row input { padding: 5px; font-size: 13px; flex: 1; margin: 0; }
        .btn-update { background: #ff9800; color: white; border: none; border-radius: 5px; padding: 7px 10px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-check { background: #eee; border: 1px solid #ccc; border-radius: 5px; padding: 7px 10px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-wa-link { background: #25D366; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; text-decoration: none; display: block; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏥 साईदत्त क्लिनिक</h1>
        <p><b>डॉ. रवींद्र घोंगडे</b></p>
        <div id="patientCount" class="count-badge">एकूण पेशंट: 0</div>
    </div>

    <div id="formSection">
        <label>पेशंटचे नाव:</label>
        <input type="text" id="name" placeholder="नाव">
        <label>मोबाईल नंबर:</label>
        <input type="number" id="phone" placeholder="नंबर">
        <label>पत्ता:</label>
        <input type="text" id="address" placeholder="पत्ता">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>तारीख:</label><input type="date" id="apt_date"></div>
            <div style="flex:1;"><label>वेळ:</label><input type="time" id="apt_time"></div>
        </div>
        <label>नोट्स:</label>
        <textarea id="notes" rows="2" placeholder="आजार/औषधे..."></textarea>
        <button class="btn-main" onclick="saveData()">💾 बुकिंग सेव्ह करा</button>
    </div>

    <div class="tabs">
        <div class="tab active-tab" onclick="switchTab(this, 'dateWise')">तारीखवार</div>
        <div class="tab" onclick="switchTab(this, 'reminderTab')">🔔 रिमाइन्डर्स</div>
        <div class="tab" onclick="switchTab(this, 'broadcastTab')">📢 ब्रॉडकास्ट</div>
    </div>

    <div id="dateWise" class="list-section active-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <input type="date" id="filterDate" onchange="renderDateWise()" style="width:150px;">
            <button onclick="generatePDF()" style="background:#dc3545; color:white; border:none; border-radius:8px; padding:5px 15px; font-weight:bold; cursor:pointer;">📄 PDF</button>
        </div>
        <div id="dateContent"></div>
    </div>

    <div id="reminderTab" class="list-section"><div id="reminderContent"></div></div>
    <div id="broadcastTab" class="list-section">
        <textarea id="bcMsg" rows="3" placeholder="ब्रॉडकास्ट मेसेज..."></textarea>
        <div id="bcContent" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    const DB_KEY = 'saidatt_final_v34'; 
    const BOOKING_NOS = "9604174209 / 02162238539";
    
    document.getElementById('apt_date').valueAsDate = new Date();
    document.getElementById('filterDate').valueAsDate = new Date();

    function fDate(d) { if(!d) return "--"; const [y, m, d1] = d.split('-'); return `${d1}/${m}/${y}`; }
    function fTime(t) { if(!t) return "--"; let [h, m] = t.split(':'); let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${ampm}`; }

    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.list-section').forEach(s => s.classList.remove('active-section'));
        el.classList.add('active-tab');
        document.getElementById(id).classList.add('active-section');
        if(id === 'dateWise') renderDateWise();
        if(id === 'reminderTab') renderReminders();
        if(id === 'broadcastTab') renderBroadcast();
    }

    function saveData() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if(!name || !phone) return alert("नाव आणि नंबर भरा!");
        
        const p = { id: Date.now(), name, phone, address: document.getElementById('address').value, notes: document.getElementById('notes').value, apt_date: document.getElementById('apt_date').value, apt_time: document.getElementById('apt_time').value, fup_date: "", checked: false };
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        db.push(p);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        
        const msg = `🏥 *साईदत्त क्लिनिक*\n\nनमस्कार *${name}*,\nआपली अपॉइंटमेंट बुक झाली आहे.\n📅 तारीख: ${fDate(p.apt_date)}\n⏰ वेळ: ${fTime(p.apt_time)}\n📍 पत्ता: ${p.address || '--'}\n\n- डॉ. रवींद्र घोंगडे`;
        window.location.href = `https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`;
    }

    function updateFup(id) {
        const fVal = document.getElementById(`fup_in_${id}`).value;
        if(!fVal) return alert("तारीख निवडा!");
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        db = db.map(p => p.id === id ? {...p, fup_date: fVal} : p);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        renderDateWise();
    }

    function renderDateWise() {
        const sel = document.getElementById('filterDate').value;
        const cont = document.getElementById('dateContent');
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const filtered = db.filter(x => x.apt_date === sel);
        
        document.getElementById('patientCount').innerText = `एकूण पेशंट: ${filtered.length}`;
        cont.innerHTML = filtered.length ? "" : "<p style='text-align:center;'>डेटा नाही.</p>";
        
        filtered.forEach((p, index) => {
            cont.innerHTML += `
                <div class="patient-card ${p.checked ? 'checked-patient' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span><span class="token-no">${index + 1}</span><b>${p.name}</b></span>
                        <small style="color:#1a73e8; font-weight:bold;">F/Up: ${fDate(p.fup_date)}</small>
                    </div>
                    <small>📞 ${p.phone} | 📍 ${p.address || '--'} | ⏰ ${fTime(p.apt_time)}</small><br>
                    <small>📝 ${p.notes || '--'}</small>
                    <div class="fup-row">
                        <input type="date" id="fup_in_${p.id}" value="${p.fup_date}">
                        <button class="btn-update" onclick="updateFup(${p.id})">UPDATE</button>
                        <button class="btn-check" onclick="toggleCheck(${p.id})">${p.checked ? '✅' : 'CHECK'}</button>
                    </div>
                    <button onclick="deleteRec(${p.id})" style="color:red; border:none; background:none; font-size:11px; margin-top:8px; cursor:pointer;">Delete</button>
                </div>`;
        });
    }

    function generatePDF() {
        const sel = document.getElementById('filterDate').value;
        const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const filtered = db.filter(x => x.apt_date === sel);
        if(!filtered.length) return alert("डेटा नाही!");

        let html = `<div style="padding:20px; font-family:Arial;">
            <h2 style="text-align:center;">साईदत्त क्लिनिक - रिपोर्ट (${fDate(sel)})</h2>
            <p><b>एकूण पेशंट: ${filtered.length}</b></p>
            <table border="1" style="width:100%; border-collapse:collapse; font-size:12px;">
                <tr style="background:#eee;"><th>Sr.</th><th>नाव</th><th>फोन</th><th>पत्ता</th><th>नोट्स</th><th>पुढील भेट</th></tr>`;
        filtered.forEach((p, i) => {
            html += `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.phone}</td><td>${p.address}</td><td>${p.notes}</td><td>${fDate(p.fup_date)}</td></tr>`;
        });
        html += `</table></div>`;
        html2pdf().from(div(html)).set({margin:10, filename:`Report_${sel}.pdf`}).save();
    }
    function div(h) { const d = document.createElement('div'); d.innerHTML = h; return d; }

    function renderReminders() {
        const cont = document.getElementById('reminderContent');
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const today = new Date(); today.setHours(0,0,0,0);
        cont.innerHTML = "<h3>🔔 रिमाइन्डर्स</h3>";
        let found = false;
        db.forEach(p => {
            if(!p.fup_date) return;
            const fd = new Date(p.fup_date); fd.setHours(0,0,0,0);
            const diff = Math.ceil((fd - today) / 86400000);
            if(diff === 0 || diff === 2) {
                found = true;
                let msg = `🏥 *साईदत्त क्लिनिक*\n\nनमस्कार *${p.name}*,\nआपल्याला आठवण करून देण्यात येते की आपली फॉलो-अप भेट दिनांक *${fDate(p.fup_date)}* रोजी आहे.`;
                if(diff === 0) msg += `\n\n*कृपया आपली अपॉइंटमेंट बुक करा.*\n📞 बुकिंग नं: ${BOOKING_NOS}`;
                msg += `\n\n- डॉ. रवींद्र घोंगडे`;
                const color = (diff === 0) ? '#ff4757' : '#ffa500';
                cont.innerHTML += `
                    <div class="patient-card" style="border-left: 10px solid ${color}; background: ${color}10;">
                        <b style="color:${color}">${diff === 0 ? '🔴 आज फॉलो-अप' : '🟡 परवा फॉलो-अप'}</b><br>
                        <b>${p.name}</b><br><small>तारीख: ${fDate(p.fup_date)}</small>
                        <a href="https://wa.me/91${p.phone}?text=${encodeURIComponent(msg)}" class="btn-wa-link" style="background:${color}">व्हॉट्सॲप पाठवा</a>
                    </div>`;
            }
        });
        if(!found) cont.innerHTML += "<p style='text-align:center;'>रिमाइन्डर्स नाहीत.</p>";
    }

    function renderBroadcast() {
        const cont = document.getElementById('bcContent');
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const unique = []; const map = new Map();
        for (const item of db) { if(!map.has(item.phone)){ map.set(item.phone, true); unique.push(item); } }
        cont.innerHTML = `<h4>एकूण पेशंट: ${unique.length}</h4>`;
        unique.reverse().forEach(p => {
            cont.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                <span><b>${p.name}</b> (${p.phone})</span>
                <button onclick="sendBC('${p.phone}', '${p.name}')" style="background:#25D366; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">SEND</button>
            </div>`;
        });
    }

    function sendBC(phone, name) {
        const txt = document.getElementById('bcMsg').value;
        if(!txt) return alert("मेसेज लिहा!");
        window.location.href = `https://wa.me/91${phone}?text=${encodeURIComponent('🏥 *साईदत्त क्लिनिक*\n\nनमस्कार ' + name + ',\n\n' + txt)}`;
    }

    function toggleCheck(id) {
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        db = db.map(p => p.id === id ? {...p, checked: !p.checked} : p);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        renderDateWise();
    }

    function deleteRec(id) {
        if(confirm("डिलीट?")) {
            let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            localStorage.setItem(DB_KEY, JSON.stringify(db.filter(x => x.id !== id)));
            renderDateWise();
        }
    }
    renderDateWise();
</script>
</body>
</html>
