<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्ता क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --yellow: #fff3cd; --red: #f8d7da; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .container { display: none; max-width: 500px; margin: auto; padding: 15px; background: white; min-height: 100vh; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-save { background: var(--secondary); }
        .btn-booking { background: #075e54; margin-top: 15px; display: none; }
        .btn-wa { background: #25D366; font-size: 13px; padding: 8px; margin-top: 8px; }
        .card { border: 1px solid #ddd; padding: 15px; margin-top: 12px; border-radius: 15px; position: relative; background: #fff; transition: 0.3s; }
        /* चेक केल्यावर कार्ड Dull होण्यासाठी CSS */
        .card.completed { opacity: 0.4; filter: grayscale(1); background: #f0f0f0; }
        .alert-yellow { background: var(--yellow) !important; border-left: 6px solid #ffc107; }
        .alert-red { background: var(--red) !important; border-left: 6px solid #dc3545; }
        .token { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; padding: 3px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
        .nav-item.active { color: var(--primary); background: #e8f0fe; border-top: 3px solid var(--primary); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="login-box">
        <h2>🏥 क्लिनिक लॉगिन</h2>
        <input type="email" id="uEmail" placeholder="ईमेल">
        <input type="password" id="uPass" placeholder="पासवर्ड">
        <button class="btn" style="background:var(--primary)" onclick="login()">प्रवेश करा</button>
    </div>
</div>

<div id="appPage" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="cTitle">साईदत्ता क्लिनिक</h3>
        <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">Logout</button>
    </div>

    <div id="regSection">
        <h4>📝 पेशंट नोंदणी</h4>
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate" title="तपासणी तारीख">
            <input type="date" id="fupDate" title="फॉलो-अप तारीख">
        </div>
        <textarea id="pNotes" placeholder="तपासणी नोट्स / औषधे"></textarea>
        <button class="btn btn-save" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        <button id="bookingConfirmBtn" class="btn btn-booking" onclick="sendBookingMessage()">📲 बुकिंग कन्फर्मेशन पाठवा (WA)</button>
    </div>

    <div id="listSection" class="hidden">
        <h4>📋 आजचे पेशंट (काऊंट तारीखनुसार)</h4>
        <input type="date" id="filterDate" onchange="loadData()">
        <div id="listDisplay" style="margin-top:15px;">माहिती लोड होत आहे...</div>
    </div>

    <div id="broadcastSection" class="hidden">
        <h4>📢 सर्व पेशंट मास्टर लिस्ट</h4>
        <div id="masterDisplay">लोड होत आहे...</div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="show('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="show('list')">आजची लिस्ट</div>
        <div class="nav-item" id="n3" onclick="show('broadcast')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_pDiZPZFfnUvlRGFxEj6B2uKuWgHIj4S4BbFw_y4c103HQqIK97wUkhR6rQ2FIKvrmQ/exec";
    let currentPatient = null;

    function login() {
        const u = document.getElementById('uEmail').value;
        const p = document.getElementById('uPass').value;
        if((u==="sai@gmail.com" && p==="sai123") || (u==="test@gmail.com" && p==="123")) {
            localStorage.setItem("user", u); startApp();
        } else { alert("पासवर्ड चुकीचा आहे!"); }
    }

    function startApp() {
        if(localStorage.getItem("user")) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').style.display='block';
            document.getElementById('pDate').valueAsDate = new Date();
            document.getElementById('filterDate').valueAsDate = new Date();
            loadData();
        }
    }

    function show(sec) {
        document.getElementById('regSection').classList.add('hidden');
        document.getElementById('listSection').classList.add('hidden');
        document.getElementById('broadcastSection').classList.add('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(sec==='reg') { document.getElementById('regSection').classList.remove('hidden'); document.getElementById('n1').classList.add('active'); }
        if(sec==='list') { document.getElementById('listSection').classList.remove('hidden'); document.getElementById('n2').classList.add('active'); loadData(); }
        if(sec==='broadcast') { document.getElementById('broadcastSection').classList.remove('hidden'); document.getElementById('n3').classList.add('active'); loadMaster(); }
    }

    async function saveData() {
        const name = document.getElementById('pName').value;
        const phone = document.getElementById('pPhone').value;
        if(!name || !phone) return alert("नाव आणि फोन नंबर आवश्यक!");

        currentPatient = {
            action: "save", userId: localStorage.getItem("user"), id: Date.now(),
            name: name, phone: phone,
            date: document.getElementById('pDate').value, fup_date: document.getElementById('fupDate').value,
            notes: document.getElementById('pNotes').value, checked: false
        };

        alert("डेटा सेव्ह झाला! आता तुम्ही मेसेज पाठवू शकता.");
        document.getElementById('bookingConfirmBtn').style.display = 'block';
        
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(currentPatient)});
    }

    function sendBookingMessage() {
        if(!currentPatient) return;
        const msg = `नमस्ते ${currentPatient.name},\nसाईदत्ता क्लिनिकमध्ये तुमची दिनांक ${currentPatient.date} साठी अपॉइंटमेंट कन्फर्म झाली आहे. धन्यवाद!`;
        window.open(`https://wa.me/91${currentPatient.phone}?text=${encodeURIComponent(msg)}`);
        document.getElementById('bookingConfirmBtn').style.display = 'none';
        // फॉर्म क्लिअर करा
        document.getElementById('pName').value = "";
        document.getElementById('pPhone').value = "";
        document.getElementById('pNotes').value = "";
    }

    async function loadData() {
        const userId = localStorage.getItem("user");
        const fDate = document.getElementById('filterDate').value;
        const display = document.getElementById('listDisplay');
        display.innerHTML = "डेटा लोड होत आहे...";

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
            const all = await resp.json();
            display.innerHTML = "";

            let count = 0;
            all.forEach((p) => {
                const today = new Date(fDate); today.setHours(0,0,0,0);
                const fup = p.fup_date ? new Date(p.fup_date) : null;
                let alertClass = "";
                if(p.fup_date === fDate) alertClass = "alert-red";
                else if(fup) {
                    const diff = Math.ceil((fup - today) / (1000 * 60 * 60 * 24));
                    if(diff > 0 && diff <= 2) alertClass = "alert-yellow";
                }

                if(p.date === fDate || alertClass !== "") {
                    count++;
                    display.innerHTML += `
                    <div id="card-${p.id}" class="card ${alertClass} ${p.checked ? 'completed' : ''}">
                        <div class="token">Token #${count}</div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" onchange="toggleCheck('${p.id}', this)" ${p.checked ? 'checked' : ''} style="width:20px; height:20px; cursor:pointer;">
                            <b style="font-size:17px;">${p.name}</b>
                        </div>
                        <div style="margin-top:10px; font-size:14px; color:#444;">
                            📞 ${p.phone} | 🔔 <span style="color:red; font-weight:bold;">F-Up: ${p.fup_date || 'N/A'}</span><br>
                            📝 Notes: ${p.notes || '-'}
                        </div>
                        <button class="btn btn-wa" onclick="sendFollowUpWA('${p.phone}','${p.name}','${p.fup_date}')">WhatsApp Reminder</button>
                    </div>`;
                }
            });
            if(count === 0) display.innerHTML = "<center><br>या तारखेला कोणतेही पेशंट नाहीत.</center>";
        } catch(e) { display.innerHTML = "Error!"; }
    }

    function toggleCheck(id, el) {
        const card = document.getElementById(`card-${id}`);
        if(el.checked) card.classList.add('completed');
        else card.classList.remove('completed');
    }

    function sendFollowUpWA(ph, nm, dt) {
        const msg = `प्रिय ${nm},\nतुमचा साईदत्ता क्लिनिकमधील फॉलो-अप दिनांक ${dt} ला आहे. कृपया वेळेवर उपस्थित राहावे.\n- डॉ. साईदत्ता क्लिनिक`;
        window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`);
    }

    async function loadMaster() {
        const userId = localStorage.getItem("user");
        const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
        const all = await resp.json();
        document.getElementById('masterDisplay').innerHTML = all.map(p => `<div class="card"><b>${p.name}</b><br>${p.phone}<br><small>तपासणी: ${p.date}</small></div>`).join('');
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = startApp;
</script>
</body>
</html>
