<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्ता क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --yellow: #ffeb3b; --red: #ff5252; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .container { display: none; max-width: 500px; margin: auto; padding: 15px; background: white; min-height: 100vh; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-save { background: var(--secondary); }
        .btn-booking { background: #075e54; margin-top: 15px; display: none; }
        .card { border: 1px solid #ddd; padding: 15px; margin-top: 12px; border-radius: 15px; position: relative; background: #fff; transition: 0.3s; }
        .card.completed { opacity: 0.4; filter: grayscale(1); }
        .alert-yellow { border-left: 10px solid var(--yellow); background: #fffde7; }
        .alert-red { border-left: 10px solid var(--red); background: #ffebee; }
        .token { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; padding: 3px 8px; border-radius: 5px; font-size: 11px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 13px; }
        .nav-item.active { color: var(--primary); background: #e8f0fe; border-top: 3px solid var(--primary); }
        .fup-input { width: auto; padding: 5px; font-size: 12px; margin-left: 10px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="login-box">
        <h2>🏥 क्लिनिक लॉगिन</h2>
        <input type="email" id="uEmail" placeholder="ईमेल">
        <input type="password" id="uPass" placeholder="पासवर्ड">
        <button class="btn" style="background:var(--primary)" onclick="login()">प्रवेश करा</button>
    </div>
</div>

<div id="appPage" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="cTitle">साईदत्ता क्लिनिक</h3>
        <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">Logout</button>
    </div>

    <div id="regSection">
        <h4>📝 नवीन पेशंट नोंदणी</h4>
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate" title="तपासणी तारीख">
            <input type="time" id="pTime" title="बुकिंग वेळ">
        </div>
        <textarea id="pNotes" placeholder="तपासणी नोट्स / औषधे"></textarea>
        <button class="btn btn-save" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        <button id="bookingConfirmBtn" class="btn btn-booking" onclick="sendBookingMessage()">📲 बुकिंग कन्फर्मेशन पाठवा (WA)</button>
    </div>

    <div id="reminderSection" class="hidden">
        <h4>🔔 रिमाइन्डर आणि फॉलो-अप</h4>
        <input type="date" id="filterDate" onchange="loadData()">
        <div id="listDisplay" style="margin-top:15px;">लोड होत आहे...</div>
    </div>

    <div id="broadcastSection" class="hidden">
        <h4>📢 ब्रॉडकास्ट (Master List)</h4>
        <div id="masterDisplay">लोड होत आहे...</div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="show('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="show('reminder')">रिमाइन्डर</div>
        <div class="nav-item" id="n3" onclick="show('broadcast')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_pDiZPZFfnUvlRGFxEj6B2uKuWgHIj4S4BbFw_y4c103HQqIK97wUkhR6rQ2FIKvrmQ/exec";
    let currentPatient = null;

    function login() {
        const u = document.getElementById('uEmail').value;
        const p = document.getElementById('uPass').value;
        if((u==="sai@gmail.com" && p==="sai123") || (u==="test@gmail.com" && p==="123")) {
            localStorage.setItem("user", u); startApp();
        } else { alert("पासवर्ड चुकीचा आहे!"); }
    }

    function startApp() {
        if(localStorage.getItem("user")) {
            document.getElementById('loginPage').style.display='none';
            document.getElementById('appPage').style.display='block';
            document.getElementById('pDate').valueAsDate = new Date();
            document.getElementById('filterDate').valueAsDate = new Date();
            loadData();
        }
    }

    function show(sec) {
        ['regSection', 'reminderSection', 'broadcastSection'].forEach(s => document.getElementById(s).style.display='none');
        ['n1', 'n2', 'n3'].forEach(n => document.getElementById(n).classList.remove('active'));
        if(sec==='reg') { document.getElementById('regSection').style.display='block'; document.getElementById('n1').classList.add('active'); }
        if(sec==='reminder') { document.getElementById('reminderSection').style.display='block'; document.getElementById('n2').classList.add('active'); loadData(); }
        if(sec==='broadcast') { document.getElementById('broadcastSection').style.display='block'; document.getElementById('n3').classList.add('active'); loadMaster(); }
    }

    async function saveData() {
        currentPatient = {
            action: "save", userId: localStorage.getItem("user"), id: Date.now(),
            name: document.getElementById('pName').value, phone: document.getElementById('pPhone').value,
            date: document.getElementById('pDate').value, time: document.getElementById('pTime').value,
            notes: document.getElementById('pNotes').value, checked: false, fup_date: ""
        };
        if(!currentPatient.name) return alert("नाव आवश्यक!");
        alert("डेटा सेव्ह झाला!");
        document.getElementById('bookingConfirmBtn').style.display = 'block';
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(currentPatient)});
    }

    function sendBookingMessage() {
        const msg = `नमस्ते ${currentPatient.name},\nतुमची साईदत्ता क्लिनिकमध्ये दिनांक ${currentPatient.date} रोजी वेळ ${currentPatient.time} वाजता अपॉइंटमेंट बुक झाली आहे. धन्यवाद!`;
        window.open(`https://wa.me/91${currentPatient.phone}?text=${encodeURIComponent(msg)}`);
        document.getElementById('bookingConfirmBtn').style.display = 'none';
        location.reload();
    }

    async function loadData() {
        const userId = localStorage.getItem("user");
        const fDate = document.getElementById('filterDate').value;
        const display = document.getElementById('listDisplay');
        display.innerHTML = "लोड होत आहे...";

        const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
        const all = await resp.json();
        display.innerHTML = "";

        let count = 0;
        all.forEach(p => {
            const today = new Date(fDate); today.setHours(0,0,0,0);
            const fup = p.fup_date ? new Date(p.fup_date) : null;
            let alertClass = "";
            if(p.fup_date === fDate) alertClass = "alert-red";
            else if(fup && Math.ceil((fup - today)/(86400000)) <= 2 && Math.ceil((fup - today)/(86400000)) > 0) alertClass = "alert-yellow";

            if(p.date === fDate || alertClass !== "") {
                count++;
                display.innerHTML += `
                <div class="card ${alertClass} ${p.checked ? 'completed' : ''}">
                    <div class="token">Token #${count} | 🕒 ${p.time || '--:--'}</div>
                    <div style="display:flex; align-items:center;">
                        <input type="checkbox" onclick="markChecked('${p.id}', this)" ${p.checked ? 'checked' : ''}>
                        <b style="margin-left:10px;">${p.name}</b>
                        <input type="date" class="fup-input" onchange="updateFUP('${p.id}', this.value)" value="${p.fup_date || ''}" title="पुढील फॉलो-अप">
                    </div>
                    <div style="font-size:12px; margin-top:10px;">📞 ${p.phone} | 📝 ${p.notes}</div>
                    <button class="btn btn-wa" onclick="sendReminder('${p.phone}','${p.name}','${p.fup_date}')">Reminder पाठवा</button>
                </div>`;
            }
        });
    }

    async function updateFUP(id, date) {
        const data = { action: "updateFUP", id: id, fup_date: date };
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)});
        alert("फॉलो-अप अपडेट झाला!");
    }

    async function markChecked(id, el) {
        const data = { action: "check", id: id, status: el.checked };
        el.parentElement.parentElement.classList.toggle('completed');
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)});
    }

    function sendReminder(ph, nm, dt) {
        const msg = `नमस्ते ${nm},\nतुमचा साईदत्ता क्लिनिकमध्ये फॉलो-अप दिनांक ${dt} ला आहे. कृपया वेळेवर यावे.`;
        window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`);
    }

    async function loadMaster() {
        const userId = localStorage.getItem("user");
        const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
        const all = await resp.json();
        // Duplicate Filter
        const unique = [];
        const seen = new Set();
        all.forEach(p => {
            const key = p.name + p.phone;
            if(!seen.has(key)) { seen.add(key); unique.push(p); }
        });
        document.getElementById('masterDisplay').innerHTML = unique.map(p => `<div class="card"><b>${p.name}</b><br>${p.phone}</div>`).join('');
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = startApp;
</script>
</body>
</html>
