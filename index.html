<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .patient-checked { opacity: 0.4; filter: grayscale(1); background-color: #f3f4f6; }
        .bg-urgent { background-color: #fee2e2; border-left: 5px solid #ef4444; }
        .bg-upcoming { background-color: #fef9c3; border-left: 5px solid #eab308; }
        #hiddenDatePicker { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-5">

    <input type="date" id="hiddenDatePicker">

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-md flex flex-wrap justify-between items-center gap-4 border-b-4 border-blue-600">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fas fa-hand-holding-heart fa-2x"></i></div>
                <h1 class="text-2xl font-bold text-blue-800">साईदत्त क्लिनिक, सातारा</h1>
            </div>
            <div class="flex items-center gap-2">
                <input type="date" id="filterDate" onchange="loadData()" class="border rounded p-1 shadow-sm font-bold text-blue-700">
                <span class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold shadow-md">आजचे पेशंट: <span id="dayCount">0</span></span>
            </div>
        </div>

        <div class="flex space-x-1">
            <button onclick="showTab('reg')" id="tab-reg" class="px-6 py-2 bg-white rounded-t-lg font-bold shadow">नोंदणी</button>
            <button onclick="showTab('rem')" id="tab-rem" class="px-6 py-2 bg-gray-200 rounded-t-lg font-bold shadow">रिमांडर्स</button>
            <button onclick="showTab('broad')" id="tab-broad" class="px-6 py-2 bg-gray-200 rounded-t-lg font-bold shadow">ब्रॉडकास्ट</button>
        </div>

        <div id="section-reg" class="bg-white p-5 rounded-b-xl shadow-lg border">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6 bg-blue-50 p-4 rounded-lg">
                <input type="text" id="pName" placeholder="पेशंटचे नाव" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="number" id="pPhone" placeholder="WhatsApp नंबर" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="text" id="pAddress" placeholder="पत्ता" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                
                <div class="flex gap-2">
                    <input type="date" id="pDate" class="p-2 border rounded w-full">
                    <input type="time" id="pTime" class="p-2 border rounded w-32">
                </div>

                <textarea id="pNotes" placeholder="लक्षणे / माहिती" class="p-2 border rounded md:col-span-3 h-12 outline-none"></textarea>
                <button onclick="saveData()" id="saveBtn" class="bg-blue-700 text-white p-2 rounded-lg font-bold hover:bg-blue-800 transition-all shadow-md">
                    <i class="fas fa-plus-circle"></i> नोंदणी करा
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-200 text-gray-700">
                        <tr>
                            <th class="p-3 text-center">तपासले</th>
                            <th class="p-3">नाव & पत्ता</th>
                            <th class="p-3">संपर्क</th>
                            <th class="p-3">वेळ</th>
                            <th class="p-3">पुढील भेट</th>
                            <th class="p-3">ॲक्शन</th>
                        </tr>
                    </thead>
                    <tbody id="patientTable" class="divide-y bg-white"></tbody>
                </table>
            </div>
        </div>

        <div id="section-rem" class="hidden bg-white p-5 rounded-xl shadow-lg border">
            <h2 class="text-xl font-bold mb-4 text-orange-700"><i class="fas fa-heartbeat"></i> काळजीपूर्वक रिमांडर्स</h2>
            <div id="reminderList" class="space-y-3"></div>
        </div>

        <div id="section-broad" class="hidden bg-white p-5 rounded-xl shadow-lg border">
            <h2 class="text-xl font-bold mb-2">📢 आरोग्य संदेश (Broadcast)</h2>
            <textarea id="broadMsg" placeholder="मेसेज लिहा..." class="w-full p-3 border rounded-lg h-24 mb-4"></textarea>
            <div id="broadcastList" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby65i7Nr5-TwPkuAC9XKOkT8qxV0nHBjmUndejNVcu4wcw6RSa_XSy32Op5Nn7e4rQ/exec";
        let allPatients = [];

        function showTab(tab) {
            document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.replace('bg-white', 'bg-gray-200'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.replace('bg-gray-200', 'bg-white');
        }

        function formatDateMarathi(dateStr) {
            if (!dateStr || dateStr === "-") return "-";
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
        }

        async function saveData() {
            const data = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                address: document.getElementById('pAddress').value,
                date: document.getElementById('pDate').value || new Date().toISOString().split('T')[0],
                time: document.getElementById('pTime').value || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                notes: document.getElementById('pNotes').value
            };
            if(!data.name || !data.phone) return alert("नाव आणि नंबर भरा!");
            
            document.getElementById('saveBtn').innerText = "नोंदणी होत आहे...";
            try {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
                const msg = `*साईदत्त क्लिनिक, सातारा* ✨\n\nनमस्ते ${data.name} जी,\n\nतुमची आजची वेळ यशस्वीपणे नोंदवली गेली आहे.\n🗓️ तारीख: *${formatDateMarathi(data.date)}*\n⏰ वेळ: *${data.time}*\n\nआमच्यासाठी तुमचे आरोग्य हीच प्राथमिकता आहे. \n\n_"आरोग्यं धनसंपदा"_ 🌱\n- साईदत्त क्लिनिक`;
                window.open(`https://wa.me/91${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
                location.reload();
            } catch(e) { location.reload(); }
        }

        function markAsChecked(index, phone, name) {
            const dateInput = document.getElementById('hiddenDatePicker');
            dateInput.onchange = async function() {
                const nextDate = dateInput.value;
                if (!nextDate) return;
                try {
                    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "updateFollowUp", rowIndex: index + 2, fdate: nextDate })});
                    const msg = `*साईदत्त क्लिनिक - पुढील भेट* ❤️\n\nप्रिय ${name} जी,\n\nतुमची आजची तपासणी पूर्ण झाली आहे. पुढील उपचारांसाठी तुमची तारीख *${formatDateMarathi(nextDate)}* निश्चित केली आहे.\n\nनिरोगी आयुष्यासाठी आम्ही सदैव सोबत आहोत!\n\n_"निरोगी राहा, आनंदी राहा"_ 🌸\n- साईदत्त क्लिनिक`;
                    window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                    location.reload();
                } catch(e) { location.reload(); }
            };
            dateInput.showPicker();
        }

        async function loadData() {
            const table = document.getElementById('patientTable');
            const remList = document.getElementById('reminderList');
            const broadList = document.getElementById('broadcastList');
            const fDateInput = document.getElementById('filterDate');
            if(!fDateInput.value) fDateInput.value = new Date().toISOString().split('T')[0];
            const today = fDateInput.value;

            try {
                const res = await fetch(WEB_APP_URL);
                allPatients = await res.json();
                table.innerHTML = ""; remList.innerHTML = ""; broadList.innerHTML = "";
                let count = 0;

                allPatients.forEach((row, index) => {
                    const name = row[1], phone = row[2], address = row[3], pDate = row[4], time = row[6], fDate = row[8], status = row[9];
                    
                    if(pDate === today) {
                        count++;
                        const isChecked = (status === "Checked");
                        const tr = document.createElement('tr');
                        if(isChecked) tr.className = "patient-checked";
                        tr.innerHTML = `
                            <td class="p-3 text-center"><button onclick="markAsChecked(${index}, '${phone}', '${name}')" class="text-2xl ${isChecked ? 'text-green-600' : 'text-gray-300 hover:text-green-500'}"><i class="fas fa-check-circle"></i></button></td>
                            <td class="p-3 font-bold text-slate-800">${name}<br><span class="text-xs text-blue-500 font-normal"><i class="fas fa-map-marker-alt"></i> ${address || '-'}</span></td>
                            <td class="p-3 text-sm">${phone}</td>
                            <td class="p-3 text-sm font-medium text-slate-600">${time || '-'}</td>
                            <td class="p-3 font-bold text-orange-600">${formatDateMarathi(fDate)}</td>
                            <td class="p-3"><button onclick="editPatient(${index})" class="text-blue-500 mr-4"><i class="fas fa-edit"></i></button><button onclick="window.open('https://wa.me/91${phone}')" class="text-green-500"><i class="fab fa-whatsapp"></i></button></td>
                        `;
                        table.appendChild(tr);
                    }

                    // Reminder Logic Added Back
                    if(fDate) {
                        const diff = (new Date(fDate) - new Date(today)) / (1000*60*60*24);
                        if(diff === 0 || (diff > 0 && diff <= 2)) {
                            const div = document.createElement('div');
                            div.className = `p-4 rounded-lg shadow flex justify-between items-center ${diff === 0 ? 'bg-urgent' : 'bg-upcoming'}`;
                            div.innerHTML = `<div><b>${name}</b><br><small>भेट: ${formatDateMarathi(fDate)}</small></div><button onclick="sendRemindMsg('${phone}', '${name}', '${fDate}')" class="bg-green-600 text-white px-3 py-2 rounded font-bold text-sm">आठवण करा</button>`;
                            remList.appendChild(div);
                        }
                    }

                    // Broadcast Logic Added Back
                    const bDiv = document.createElement('div');
                    bDiv.className = "bg-white border p-3 rounded flex justify-between items-center shadow-sm";
                    bDiv.innerHTML = `<span class="text-sm font-medium">${name}</span> <button onclick="sendBroadSingle('${phone}')" class="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1 rounded-full text-xs font-bold">मेसेज पाठवा</button>`;
                    broadList.appendChild(bDiv);
                });
                document.getElementById('dayCount').innerText = count;
            } catch(e) { }
        }

        function sendRemindMsg(phone, name, date) {
            const msg = `*साईदत्त क्लिनिक - आपुलकीची आठवण* 🌿\n\nनमस्कार ${name} जी,\n\nतुमची तब्येत आता सुधारत असेलच. तुमची पुढील तपासणी *${formatDateMarathi(date)}* रोजी आहे. वेळेवर येऊन औषधे सुरू ठेवावीत ही विनंती.\n\n_"आरोग्य हीच खरी संपत्ती"_ 🙏\n- साईदत्त क्लिनिक, सातारा`;
            window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function sendBroadSingle(num) {
            const msg = document.getElementById('broadMsg').value;
            if(!msg) return alert("मेसेज लिहा!");
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function editPatient(idx) {
            const p = allPatients[idx];
            document.getElementById('pName').value = p[1];
            document.getElementById('pPhone').value = p[2];
            document.getElementById('pAddress').value = p[3];
            document.getElementById('pDate').value = p[4];
            document.getElementById('pTime').value = p[6];
            document.getElementById('pNotes').value = p[5];
            window.scrollTo(0,0);
        }

        window.onload = loadData;
    </script>
</body>
</html>
