<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; background: white; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .counter-box { background: #e8f0fe; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; border: 1px solid var(--primary); font-weight: bold; font-size: 16px; }
        
        /* Form Styling */
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; font-size: 16px; transition: 0.3s; }
        .btn-save { background: var(--secondary); box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2); }
        .btn-save:active { transform: scale(0.98); }
        
        /* Patient Card Styling */
        .card { border: 1px solid #ddd; padding: 15px; margin-top: 12px; border-radius: 12px; position: relative; background: #fff; transition: 0.3s; }
        .token-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .edit-btn { background: #f0f4ff; color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; float: left; margin-right: 10px; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 14px; }
        .nav-item.active { color: var(--primary); background: #f0f4ff; border-top: 4px solid var(--primary); }
        
        .wa-btn { background: #25D366; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏥 साईदत्त क्लिनिक, सातारा</h2>
    </div>

    <div class="counter-box">
        आजचे एकूण पेशंट: <span id="dailyCount">0</span>
    </div>

    <div id="regSection">
        <h4 id="formTitle">📝 नवीन पेशंट नोंदणी</h4>
        <input type="hidden" id="editingId">
        <input type="text" id="pName" placeholder="पेशंटचे नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <input type="text" id="pAddress" placeholder="पत्ता">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate">
            <input type="time" id="pTime">
        </div>
        <textarea id="pNotes" rows="3" placeholder="तपासणी नोट्स / आजार"></textarea>
        
        <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        <button class="btn hidden" id="cancelBtn" onclick="cancelEdit()" style="background:#666;">रद्द करा</button>

        <div style="margin-top:25px; padding:15px; background:#f8f9fa; border-radius:10px; border: 1px solid #eee;">
            <b>तारीखनुसार लिस्ट:</b> 
            <input type="date" id="listDate" onchange="loadData()" style="width:55%; padding:6px; margin:0; float:right;">
            <div style="clear:both;"></div>
        </div>

        <div id="patientList" style="margin-top:10px;">लोड होत आहे...</div>
    </div>

    <div id="remSection" class="hidden"><h4 style="text-align:center; color:#666; margin-top:50px;">🔔 रिमाइन्डर सुविधा लवकरच येत आहे...</h4></div>
    <div id="broadSection" class="hidden"><h4 style="text-align:center; color:#666; margin-top:50px;">📢 ब्रॉडकास्ट सुविधा लवकरच येत आहे...</h4></div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="showTab('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="showTab('rem')">रिमाइन्डर</div>
        <div class="nav-item" id="n3" onclick="showTab('broad')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    // तुमची नवीन Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVeIAL6WOp96t9n4a16dMZSmILnmIGBV5ONVGFX8el6XB287SrRKTofa14qVbJQD4M/exec";
    let patients = [];

    // १. डेटा सेव्ह करणे
    async function saveData() {
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        if(!name || !phone) return alert("कृपया नाव आणि मोबाईल नंबर भरा!");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "सेव्ह होत आहे... कृपया थांबा";
        btn.disabled = true;

        const data = {
            action: "save",
            id: document.getElementById('editingId').value || Date.now().toString(),
            name: name,
            phone: phone,
            address: document.getElementById('pAddress').value,
            date: document.getElementById('pDate').value,
            time: document.getElementById('pTime').value,
            notes: document.getElementById('pNotes').value,
            userId: "sai@gmail.com"
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("डेटा यशस्वीरित्या सेव्ह झाला! ✅");
            
            // टोकन नंबरसाठी आजचा काउंट चेक करणे
            const currentCount = parseInt(document.getElementById('dailyCount').innerText);
            if(confirm("पेशंटला टोकन नंबरसह WhatsApp पाठवायचा का?")) {
                sendWA(name, phone, currentCount + 1, data.time);
            }
            
            cancelEdit();
            loadData();
        } catch (e) {
            alert("एरर: डेटा सेव्ह झाला नाही. इंटरनेट तपासा.");
        } finally {
            btn.innerText = "💾 डेटा सेव्ह करा";
            btn.disabled = false;
        }
    }

    // २. डेटा लोड करणे (टोकन आणि काउंटसह)
    async function loadData() {
        document.getElementById('patientList').innerHTML = "<center>माहिती शोधत आहे...</center>";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get`);
            patients = await res.json();
            const selDate = document.getElementById('listDate').value;

            const filtered = patients.filter(p => {
                let pDate = p.date;
                if (typeof pDate === 'string' && pDate.includes('T')) pDate = pDate.split('T')[0];
                return pDate === selDate;
            });

            document.getElementById('dailyCount').innerText = filtered.length;

            if(filtered.length === 0) {
                document.getElementById('patientList').innerHTML = "<center style='color:#999; padding:20px;'>आज एकही नोंदणी नाही.</center>";
                return;
            }

            document.getElementById('patientList').innerHTML = filtered.map((p, i) => `
                <div class="card">
                    <span class="token-badge">टोकन: ${i + 1}</span>
                    <button class="edit-btn" onclick="editP('${p.id}')">✏️ EDIT</button>
                    <div style="margin-top:5px; margin-left:70px;">
                        <b style="font-size:16px;">${p.name}</b><br>
                        <small style="color:#666;">🕒 ${p.time || '--:--'} | 📞 ${p.phone}</small>
                    </div>
                    <button class="wa-btn" onclick="sendWA('${p.name}', '${p.phone}', '${i + 1}', '${p.time}')">💬 WhatsApp टोकन पाठवा</button>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('patientList').innerHTML = "<center>डेटा लोड करताना अडचण आली.</center>";
        }
    }

    // ३. एडिट फंक्शन
    function editP(id) {
        const p = patients.find(x => x.id == id);
        if(!p) return;
        document.getElementById('editingId').value = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPhone').value = p.phone;
        document.getElementById('pAddress').value = p.address || "";
        document.getElementById('pDate').value = p.date ? p.date.split('T')[0] : "";
        document.getElementById('pTime').value = p.time || "";
        document.getElementById('pNotes').value = p.notes || "";
        
        document.getElementById('formTitle').innerText = "✏️ माहिती सुधारा";
        document.getElementById('saveBtn').innerText = "🔄 अपडेट करा";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ४. WhatsApp मेसेज (टोकनसह)
    function sendWA(name, phone, token, time) {
        const msg = `🏥 *साईदत्त क्लिनिक, सातारा*\n\nनमस्ते *${name}*,\nतुमची नोंदणी यशस्वी झाली आहे.\n\n✅ *टोकन नंबर: ${token}*\n🕒 वेळ: ${time || '--:--'}\n\nकृपया वेळेवर उपस्थित राहा. धन्यवाद! 🙏`;
        const waUrl = `https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`;
        window.open(waUrl, '_blank');
    }

    // ५. टॅब स्विचिंग
    function showTab(t) {
        ['regSection', 'remSection', 'broadSection'].forEach(id => document.getElementById(id).classList.add('hidden'));
        ['n1', 'n2', 'n3'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(t + 'Section').classList.remove('hidden');
        document.getElementById(t === 'reg' ? 'n1' : (t === 'rem' ? 'n2' : 'n3')).classList.add('active');
    }

    function cancelEdit() {
        document.getElementById('editingId').value = "";
        document.getElementById('pName').value = "";
        document.getElementById('pPhone').value = "";
        document.getElementById('pAddress').value = "";
        document.getElementById('pNotes').value = "";
        document.getElementById('formTitle').innerText = "📝 नवीन पेशंट नोंदणी";
        document.getElementById('saveBtn').innerText = "💾 डेटा सेव्ह करा";
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pDate').value = today;
        document.getElementById('listDate').value = today;
        loadData();
    };
</script>
</body>
</html>
