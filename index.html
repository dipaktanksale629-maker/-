<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 90vh; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .counter-box { background: #e8f0fe; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid var(--primary); font-weight: bold; color: var(--primary); font-size: 18px; }
        
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-save { background: var(--secondary); color: white; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2); }
        
        .card { border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; position: relative; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .token-badge { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .edit-btn { background: #f1f3f4; color: #555; border: 1px solid #ccc; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .wa-btn { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .hidden { display: none; }
        hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏥 साईदत्त क्लिनिक</h2>
    </div>

    <div class="counter-box">
        आजचे एकूण पेशंट: <span id="dailyCount">0</span>
    </div>

    <div id="formSection">
        <h4 id="formTitle" style="margin:0;">📝 नवीन नोंदणी</h4>
        <input type="hidden" id="editingId">
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर (उदा. 98XXXXXXXX)">
        <input type="text" id="pAddress" placeholder="गावाचे नाव / पत्ता">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate">
            <input type="time" id="pTime">
        </div>
        <textarea id="pNotes" rows="2" placeholder="तपासणी नोट्स (आजार इ.)"></textarea>
        
        <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        <button class="btn hidden" id="cancelBtn" onclick="cancelEdit()" style="background:#666; color:white;">रद्द करा</button>
    </div>

    <hr>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <b>तारीख निवडा:</b>
        <input type="date" id="listDate" onchange="loadData()" style="width: 50%; margin: 0; padding: 8px;">
    </div>

    <div id="patientList">डेटा लोड होत आहे...</div>
</div>

<script>
    // तुमची दिलेली नवीन Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMCQ8ZyPxloq9byAnmloU-iaDg97M_qlrzPbc3obRu0RQKy_wBSbIUgDye_P0BPHPI/exec";
    let patients = [];

    // १. डेटा सेव्ह करणे
    async function saveData() {
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        if(!name || !phone) return alert("कृपया नाव आणि मोबाईल नंबर भरा!");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ सेव्ह होत आहे...";
        btn.disabled = true;

        const data = {
            action: "save",
            id: document.getElementById('editingId').value || "P-" + Date.now(),
            name: name,
            phone: phone,
            address: document.getElementById('pAddress').value,
            date: document.getElementById('pDate').value,
            time: document.getElementById('pTime').value,
            notes: document.getElementById('pNotes').value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("डेटा यशस्वीरित्या सेव्ह झाला! ✅");
            
            const currentCount = parseInt(document.getElementById('dailyCount').innerText);
            if(confirm("पेशंटला टोकन नंबर " + (currentCount + 1) + " सह WhatsApp पाठवायचा का?")) {
                sendWA(name, phone, currentCount + 1, data.time);
            }
            
            cancelEdit();
            loadData();
        } catch (e) {
            alert("काहीतरी तांत्रिक अडचण आली! इंटरनेट तपासा.");
        } finally {
            btn.innerText = "💾 डेटा सेव्ह करा";
            btn.disabled = false;
        }
    }

    // २. डेटा लोड करणे
    async function loadData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get`);
            patients = await res.json();
            const selDate = document.getElementById('listDate').value;

            const filtered = patients.filter(p => {
                let pDate = p.date;
                if (typeof pDate === 'string' && pDate.includes('T')) pDate = pDate.split('T')[0];
                return pDate === selDate;
            });

            document.getElementById('dailyCount').innerText = filtered.length;

            if(filtered.length === 0) {
                document.getElementById('patientList').innerHTML = "<center style='color:#999; padding:20px;'>आज एकही नोंदणी नाही.</center>";
                return;
            }

            document.getElementById('patientList').innerHTML = filtered.map((p, i) => `
                <div class="card">
                    <span class="token-badge">टोकन: ${i + 1}</span>
                    <button class="edit-btn" onclick="editP('${p.id}')">✏️ सुधारणा करा</button>
                    <div style="margin-top:5px;">
                        <b style="font-size:17px;">${p.name}</b><br>
                        <small style="color:#666;">🕒 ${p.time || '--:--'} | 📞 ${p.phone}</small>
                    </div>
                    <button class="wa-btn" onclick="sendWA('${p.name}', '${p.phone}', '${i + 1}', '${p.time}')">💬 WhatsApp टोकन पाठवा</button>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('patientList').innerHTML = "<center>डेटा लोड होऊ शकला नाही.</center>";
        }
    }

    // ३. एडिट फंक्शन
    function editP(id) {
        const p = patients.find(x => x.id == id);
        if(!p) return;
        document.getElementById('editingId').value = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPhone').value = p.phone;
        document.getElementById('pAddress').value = p.address || "";
        document.getElementById('pDate').value = p.date ? p.date.split('T')[0] : "";
        document.getElementById('pTime').value = p.time || "";
        document.getElementById('pNotes').value = p.notes || "";
        
        document.getElementById('formTitle').innerText = "✏️ माहिती सुधारा";
        document.getElementById('saveBtn').innerText = "🔄 अपडेट करा";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ४. WhatsApp मेसेज
    function sendWA(name, phone, token, time) {
        const msg = `🏥 *साईदत्त क्लिनिक, सातारा*\n\nनमस्ते *${name}*,\nतुमची नोंदणी यशस्वी झाली आहे.\n\n✅ *टोकन नंबर: ${token}*\n🕒 वेळ: ${time || '--:--'}\n\nधन्यवाद! 🙏`;
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function cancelEdit() {
        document.getElementById('editingId').value = "";
        document.getElementById('pName').value = "";
        document.getElementById('pPhone').value = "";
        document.getElementById('pAddress').value = "";
        document.getElementById('pNotes').value = "";
        document.getElementById('formTitle').innerText = "📝 नवीन नोंदणी";
        document.getElementById('saveBtn').innerText = "💾 डेटा सेव्ह करा";
        document.getElementById('cancelBtn').classList.add('hidden');
        document.getElementById('pDate').valueAsDate = new Date();
    }

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pDate').value = today;
        document.getElementById('listDate').value = today;
        loadData();
    };
</script>
</body>
</html>
