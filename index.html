<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - पेशंट नोंदणी</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold text-blue-600 mb-4 text-center">साईदत्त क्लिनिक, सातारा</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input type="text" id="pName" placeholder="पेशंटचे नाव" class="p-2 border rounded">
            <input type="text" id="pPhone" placeholder="मोबाईल नंबर" class="p-2 border rounded">
            <input type="text" id="pAddress" placeholder="पत्ता" class="p-2 border rounded">
            <input type="date" id="pDate" class="p-2 border rounded">
            <textarea id="pNotes" placeholder="तपासणी माहिती (Notes)" class="p-2 border rounded md:col-span-2"></textarea>
            <button onclick="saveData()" id="saveBtn" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600 md:col-span-2 font-bold">
                💾 डेटा सेव्ह करा
            </button>
        </div>

        <hr class="my-6">

        <h2 class="text-xl font-semibold mb-3 text-gray-700">आजची नोंदणी:</h2>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2">नाव</th>
                        <th class="border p-2">मोबाईल</th>
                        <th class="border p-2">पत्ता</th>
                        <th class="border p-2">माहिती</th>
                    </tr>
                </thead>
                <tbody id="patientTable">
                    <tr><td colspan="4" class="p-4 text-center">डेटा लोड होत आहे...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // तुमची नवीन Google Script URL मी इथे ॲड केली आहे
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxfs80OWebQJBjih3OR_UlK50fWBhqyY-IisWbLizflR35Pm7hW0Jhxgdt_AWZJjfAC/exec";

        // १. डेटा सेव्ह करणे (Save Data)
        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const data = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                address: document.getElementById('pAddress').value,
                date: document.getElementById('pDate').value,
                time: new Date().toLocaleTimeString(),
                notes: document.getElementById('pNotes').value
            };

            if (!data.name || !data.phone) {
                alert("कृपया नाव आणि मोबाईल नंबर भरा!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "सेव्ह होत आहे...";

            try {
                // POST Request
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                
                alert("✅ डेटा यशस्वीपणे सेव्ह झाला!");
                location.reload(); // पेज रिफ्रेश करा
            } catch (e) {
                // 'no-cors' मुळे एरर आला तरी डेटा जातो, म्हणून चेक करा
                console.log("डेटा पाठवला गेला आहे.");
                alert("नोंदणी पूर्ण झाली!");
                location.reload();
            } finally {
                btn.disabled = false;
                btn.innerText = "💾 डेटा सेव्ह करा";
            }
        }

        // २. डेटा लोड करणे (Load Data)
        async function loadData() {
            const tableBody = document.getElementById('patientTable');
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                tableBody.innerHTML = ""; 

                if (!data || data.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='4' class='p-4 text-center'>आज एकही नोंदणी नाही.</td></tr>";
                    return;
                }

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-2 border">${row[0] || '-'}</td>
                        <td class="p-2 border">${row[1] || '-'}</td>
                        <td class="p-2 border">${row[2] || '-'}</td>
                        <td class="p-2 border">${row[5] || '-'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                tableBody.innerHTML = "<tr><td colspan='4' class='p-4 text-center text-red-500'>डेटा लोड होऊ शकला नाही. पेज रिफ्रेश करा.</td></tr>";
                console.error("Fetch Error:", error);
            }
        }

        // पेज उघडल्यावर डेटा लोड करा
        window.onload = loadData;
    </script>
</body>
</html>
