<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्ता क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --yellow: #ffeb3b; --red: #ff5252; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .container { display: none; max-width: 500px; margin: auto; padding: 15px; background: white; min-height: 100vh; }
        input, textarea { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-save { background: var(--secondary); }
        .card { border: 1px solid #ddd; padding: 12px; margin-top: 10px; border-radius: 12px; background: #fff; position: relative; transition: 0.3s; }
        .card.completed { opacity: 0.5; filter: grayscale(1); background: #f9f9f9; }
        .alert-yellow { border-left: 8px solid var(--yellow); }
        .alert-red { border-left: 8px solid var(--red); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; z-index: 100; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 13px; }
        .nav-item.active { color: var(--primary); background: #e8f0fe; border-top: 3px solid var(--primary); }
        .hidden { display: none; }
        .wa-btn { background: #25D366; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="login-box">
        <h2>🏥 क्लिनिक लॉगिन</h2>
        <input type="email" id="uEmail" placeholder="ईमेल">
        <input type="password" id="uPass" placeholder="पासवर्ड">
        <button class="btn" style="background:var(--primary)" onclick="login()">प्रवेश करा</button>
    </div>
</div>

<div id="appPage" class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>साईदत्ता क्लिनिक</h3>
        <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold;">Logout</button>
    </div>

    <div id="regSection">
        <h4>📝 नवीन पेशंट नोंदणी</h4>
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate" title="तपासणी तारीख">
            <input type="time" id="pTime" title="बुकिंग वेळ">
        </div>
        <textarea id="pNotes" placeholder="तपासणी नोट्स / औषधे"></textarea>
        <button class="btn btn-save" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        
        <hr style="margin-top:20px;">
        <h5>हालतीची नोंदणी (Recent Patients)</h5>
        <div id="recentDisplay">लोड होत आहे...</div>
    </div>

    <div id="reminderSection" class="hidden">
        <h4>🔔 आजचे आणि आगामी फॉलो-अप</h4>
        <div id="reminderDisplay">फक्त रिमाइन्डर असलेले पेशंट लोड होत आहेत...</div>
    </div>

    <div id="broadcastSection" class="hidden">
        <h4>📢 ब्रॉडकास्ट मेसेज</h4>
        <textarea id="broadcastMsg" placeholder="येथे मेसेज टाईप करा..."></textarea>
        <p style="font-size: 11px; color: #666;">* खालील पेशंट निवडून 'WhatsApp' चिन्हावर क्लिक करा.</p>
        <div id="masterDisplay">लोड होत आहे...</div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="show('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="show('reminder')">रिमाइन्डर</div>
        <div class="nav-item" id="n3" onclick="show('broadcast')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzg2zBV_rHpsV3IVhKix53bSNLHcI9o94aNq956Os0HEJXf0HqeH_Obb9d5tSr9SyoP/exec";

    function login() {
        const u = document.getElementById('uEmail').value;
        const p = document.getElementById('uPass').value;
        if(u==="sai@gmail.com" && p==="sai123") {
            localStorage.setItem("user", u); startApp();
        } else { alert("पासवर्ड चुकीचा आहे!"); }
    }

    function startApp() {
        if(localStorage.getItem("user")) {
            document.getElementById('loginPage').style.display='none';
            document.getElementById('appPage').style.display='block';
            document.getElementById('pDate').valueAsDate = new Date();
            loadAllData();
        }
    }

    function show(sec) {
        ['regSection', 'reminderSection', 'broadcastSection'].forEach(s => document.getElementById(s).style.display='none');
        ['n1', 'n2', 'n3'].forEach(n => document.getElementById(n).classList.remove('active'));
        if(sec==='reg') { document.getElementById('regSection').style.display='block'; document.getElementById('n1').classList.add('active'); }
        if(sec==='reminder') { document.getElementById('reminderSection').style.display='block'; document.getElementById('n2').classList.add('active'); }
        if(sec==='broadcast') { document.getElementById('broadcastSection').style.display='block'; document.getElementById('n3').classList.add('active'); }
        loadAllData();
    }

    async function saveData() {
        const pName = document.getElementById('pName').value;
        const pPhone = document.getElementById('pPhone').value;
        const pDate = document.getElementById('pDate').value;
        const pTime = document.getElementById('pTime').value;
        const pNotes = document.getElementById('pNotes').value;

        if(!pName || !pPhone) return alert("नाव आणि नंबर आवश्यक!");

        const data = {
            action: "save", userId: localStorage.getItem("user"), id: Date.now(),
            name: pName, phone: pPhone, date: pDate, time: pTime, notes: pNotes
        };

        // Professional Booking Message
        const msg = `🏥 *साईदत्ता क्लिनिक*\n\nनमस्ते ${pName},\nतुमची तपासणीची वेळ निश्चित झाली आहे.\n📅 तारीख: ${pDate}\n🕒 वेळ: ${pTime}\n\nकृपया वेळेवर उपस्थित राहावे. धन्यवाद!`;
        
        if(confirm("डेटा सेव्ह झाला! पेशंटला WhatsApp मेसेज पाठवायचा का?")) {
            window.open(`https://wa.me/91${pPhone}?text=${encodeURIComponent(msg)}`);
        }

        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)});
        location.reload();
    }

    async function loadAllData() {
        const userId = localStorage.getItem("user");
        const resp = await fetch(`${SCRIPT_URL}?action=get&userId=${userId}`);
        const all = await resp.json();
        const today = new Date(); today.setHours(0,0,0,0);
        const todayStr = today.toISOString().split('T')[0];

        // १. नोंदणी खालील लिस्ट
        document.getElementById('recentDisplay').innerHTML = all.slice(-5).reverse().map(p => `
            <div class="card ${p.checked ? 'completed' : ''}">
                <div style="display:flex; justify-content:space-between;">
                    <b>${p.name}</b>
                    <input type="checkbox" onclick="toggleCheck('${p.id}', this)" ${p.checked ? 'checked' : ''}>
                </div>
                <div style="font-size:12px; margin-top:5px;">
                    📞 ${p.phone} | 🕒 ${p.time || '-'}<br>
                    📝 Notes: ${p.notes || '-'}
                </div>
                <div style="margin-top:8px; border-top:1px solid #eee; padding-top:5px;">
                    <label style="font-size:11px;">Update Follow-up:</label>
                    <input type="date" value="${p.fup_date || ''}" onchange="updateFUP('${p.id}', this.value)" style="width:130px; padding:3px; font-size:11px;">
                </div>
            </div>
        `).join('');

        // २. रिमाइन्डर (Today & 2 Days Before)
        let remHTML = "";
        all.forEach(p => {
            if(!p.fup_date) return;
            const fDate = new Date(p.fup_date); fDate.setHours(0,0,0,0);
            const diff = Math.ceil((fDate - today) / (86400000));
            
            let aClass = "";
            if(p.fup_date === todayStr) aClass = "alert-red";
            else if(diff > 0 && diff <= 2) aClass = "alert-yellow";

            if(aClass !== "") {
                const fMsg = `🏥 *साईदत्ता क्लिनिक रिमाइन्डर*\n\nनमस्ते ${p.name},\nतुमचा फॉलो-अप तपासणीचा दिनांक ${p.fup_date} हा आहे. कृपया वेळेवर यावे.\nधन्यवाद!`;
                remHTML += `<div class="card ${aClass}">
                    <b>${p.name}</b><br><small>🔔 Follow-up: ${p.fup_date}</small>
                    <button class="wa-btn" style="float:right" onclick="window.open('https://wa.me/91${p.phone}?text=${encodeURIComponent(fMsg)}')">Send WA</button>
                </div>`;
            }
        });
        document.getElementById('reminderDisplay').innerHTML = remHTML || "सध्या कोणतेही रिमाइन्डर नाहीत.";

        // ३. ब्रॉडकास्ट (Duplicate Filter)
        const unique = []; const seen = new Set();
        all.forEach(p => {
            const key = p.name.trim().toLowerCase() + p.phone;
            if(!seen.has(key)) { seen.add(key); unique.push(p); }
        });
        document.getElementById('masterDisplay').innerHTML = unique.map(p => `
            <div class="card">
                <b>${p.name}</b> <span style="font-size:11px; color:#666;">(${p.phone})</span>
                <button class="wa-btn" style="float:right" onclick="sendBroadcast('${p.phone}')">Send</button>
            </div>
        `).join('');
    }

    async function updateFUP(id, date) {
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify({action:"updateFUP", id:id, fup_date:date})});
        alert("फॉलो-अप तारीख अपडेट झाली!");
    }

    async function toggleCheck(id, el) {
        el.parentElement.parentElement.classList.toggle('completed');
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify({action:"check", id:id, status:el.checked})});
    }

    function sendBroadcast(phone) {
        const msg = document.getElementById('broadcastMsg').value;
        if(!msg) return alert("आधी मेसेज टाईप करा!");
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
    }

    function logout() { localStorage.clear(); location.reload(); }
    window.onload = startApp;
</script>
</body>
</html>
