<script>
    // तुमची नवीन Google Script URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxz536zf952R392X4Aw8aZDz7BNhQfuklG5q0qzkG7aA11U4_iP9gKTjhnIHVKt2Fg/exec";

    // १. डेटा सेव्ह करणे (Save Data)
    async function saveData() {
        const btn = document.getElementById('saveBtn');
        const data = {
            name: document.getElementById('pName').value,
            phone: document.getElementById('pPhone').value,
            address: document.getElementById('pAddress').value,
            date: document.getElementById('pDate').value,
            time: new Date().toLocaleTimeString(),
            notes: document.getElementById('pNotes').value
        };

        if (!data.name || !data.phone) {
            alert("कृपया नाव आणि मोबाईल नंबर भरा!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "सेव्ह होत आहे...";

        try {
            // POST request (No-CORS मोडमध्ये डेटा फक्त पाठवला जातो)
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });
            
            alert("✅ डेटा यशस्वीपणे सेव्ह झाला!");
            location.reload(); // पेज रिफ्रेश करून नवीन डेटा दाखवा
        } catch (e) {
            alert("❌ एरर: डेटा सेव्ह झाला नाही.");
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 डेटा सेव्ह करा";
        }
    }

    // २. डेटा लोड करणे (Load Data)
    async function loadData() {
        const tableBody = document.getElementById('patientTable');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();

            tableBody.innerHTML = ""; // जुना मेसेज पुसून टाका

            if (data.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='4' class='p-4 text-center'>आज एकही नोंदणी नाही.</td></tr>";
                return;
            }

            // डेटा टेबलमध्ये भरून दाखवणे
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 border">${row[0]}</td>
                    <td class="p-2 border">${row[1]}</td>
                    <td class="p-2 border">${row[2]}</td>
                    <td class="p-2 border">${row[5] || '-'}</td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (error) {
            tableBody.innerHTML = "<tr><td colspan='4' class='p-4 text-center text-red-500'>नेटवर्क तपासा किंवा पेज रिफ्रेश करा.</td></tr>";
            console.error("Fetch Error:", error);
        }
    }

    // पेज उघडल्यावर डेटा दाखवा
    window.onload = loadData;
</script>
