<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: var(--primary); margin-bottom: 15px; }
        .counter-box { background: #e8f0fe; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid var(--primary); font-weight: bold; color: var(--primary); font-size: 18px; }
        
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .btn-save { background: var(--secondary); color: white; }
        
        .card { border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; position: relative; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .token-badge { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .wa-btn { background: #25D366; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        
        /* Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 14px; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); background: #f0f4ff; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🏥 साईदत्त क्लिनिक</h2></div>
    <div class="counter-box">आजचे एकूण पेशंट: <span id="dailyCount">0</span></div>

    <div id="regSection">
        <h4 id="formTitle">📝 नवीन नोंदणी</h4>
        <input type="hidden" id="editingId">
        <input type="text" id="pName" placeholder="पेशंटचे पूर्ण नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <input type="text" id="pAddress" placeholder="पत्ता">
        <div style="display:flex; gap:10px;"><input type="date" id="pDate"><input type="time" id="pTime"></div>
        <textarea id="pNotes" placeholder="तपासणी नोट्स"></textarea>
        <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <b>तारीख निवडा:</b> <input type="date" id="listDate" onchange="loadData()" style="margin-bottom:10px;">
        <div id="patientList">डेटा लोड होत आहे...</div>
    </div>

    <div id="remSection" class="hidden">
        <h4>🔔 रिमाइन्डर (Follow-up)</h4>
        <p style="text-align:center; color:#999; padding:20px;">येथे फॉलो-अप लिस्ट दिसेल.</p>
    </div>

    <div id="broadSection" class="hidden">
        <h4>📢 ब्रॉडकास्ट मेसेज</h4>
        <textarea id="broadMsg" placeholder="सर्व पेशंटना पाठवण्यासाठी मेसेज लिहा..."></textarea>
        <button class="btn" style="background:#128C7E; color:white;" onclick="alert('येत्या अपडेटमध्ये ही सुविधा उपलब्ध होईल!')">सर्व पेशंटना पाठवा</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="showTab('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="showTab('rem')">रिमाइन्डर</div>
        <div class="nav-item" id="n3" onclick="showTab('broad')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMCQ8ZyPxloq9byAnmloU-iaDg97M_qlrzPbc3obRu0RQKy_wBSbIUgDye_P0BPHPI/exec";
    let patients = [];

    async function saveData() {
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        if(!name || !phone) return alert("नाव आणि नंबर आवश्यक!");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "सेव्ह होत आहे..."; btn.disabled = true;

        const data = {
            action: "save",
            id: document.getElementById('editingId').value || "ID-" + Date.now(),
            name: name, phone: phone, address: document.getElementById('pAddress').value,
            date: document.getElementById('pDate').value,
            time: document.getElementById('pTime').value,
            notes: document.getElementById('pNotes').value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("डेटा सेव्ह झाला! ✅");
            
            const currentCount = parseInt(document.getElementById('dailyCount').innerText);
            if(confirm("टोकन नंबर " + (currentCount + 1) + " पाठवायचा का?")) {
                sendWA(name, phone, currentCount + 1, data.time);
            }
            location.reload(); 
        } catch (e) { alert("Error!"); location.reload(); }
    }

    async function loadData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get`);
            patients = await res.json();
            const selDate = document.getElementById('listDate').value;

            const filtered = patients.filter(p => {
                let pDate = p.date;
                if (typeof pDate === 'string' && pDate.includes('T')) pDate = pDate.split('T')[0];
                return pDate === selDate;
            });

            document.getElementById('dailyCount').innerText = filtered.length;
            document.getElementById('patientList').innerHTML = filtered.map((p, i) => `
                <div class="card">
                    <span class="token-badge">टोकन: ${i + 1}</span>
                    <div style="margin-top:5px;">
                        <b>${p.name}</b><br>
                        <small>🕒 ${p.time || '--'} | 📍 ${p.address || '--'}</small>
                    </div>
                    <button class="wa-btn" onclick="sendWA('${p.name}', '${p.phone}', '${i+1}', '${p.time}')">💬 WhatsApp टोकन पाठवा</button>
                </div>
            `).join('') || "<center><br>निवडलेल्या तारखेला नोंदणी नाही.</center>";
        } catch (e) { document.getElementById('patientList').innerHTML = "नेटवर्क तपासा किंवा पेज रिफ्रेश करा."; }
    }

    function sendWA(name, phone, token, time) {
        // जर नंबर १० आकडी नसेल तर ९१ जोडा
        let cleanPhone = phone.toString().replace(/\D/g, '');
        if(cleanPhone.length === 10) cleanPhone = "91" + cleanPhone;
        
        const msg = `🏥 *साईदत्त क्लिनिक, सातारा*\n\n✅ *टोकन नंबर: ${token}*\n👤 पेशंट: ${name}\n🕒 वेळ: ${time || '--:--'}\n\nधन्यवाद! 🙏`;
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function showTab(tab) {
        ['regSection', 'remSection', 'broadSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['n1', 'n2', 'n3'].forEach(n => document.getElementById(n).classList.remove('active'));
        
        document.getElementById(tab + 'Section').classList.remove('hidden');
        document.getElementById(tab === 'reg' ? 'n1' : tab === 'rem' ? 'n2' : 'n3').classList.add('active');
    }

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pDate').value = today;
        document.getElementById('listDate').value = today;
        loadData();
    };
</script>
</body>
</html>
