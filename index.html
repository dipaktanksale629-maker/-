<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>साईदत्त क्लिनिक - स्मार्ट मॅनेजमेंट</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; background: white; min-height: 100vh; }
        input, textarea { width: 100%; padding: 12px; margin: 0 0 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-save { background: var(--secondary); margin-bottom: 15px; }
        .counter-box { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid #1a73e8; }
        .card { border: 1px solid #ddd; padding: 12px; margin-top: 10px; border-radius: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .token-badge { position: absolute; top: 10px; right: 10px; background: #1a73e8; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; background: white; border-top: 2px solid #eee; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 13px; }
        .nav-item.active { color: var(--primary); background: #e8f0fe; border-top: 3px solid var(--primary); }
        .wa-btn { background: #25D366; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; width: 100%; margin-top: 10px; }
        .edit-btn { background: #f4f7f6; color: #1a73e8; border: 1px solid #1a73e8; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-bottom: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color:var(--primary); text-align:center;">🏥 साईदत्त क्लिनिक, सातारा</h3>

    <div class="counter-box">
        <b>आजचे एकूण पेशंट: <span id="todayCount">0</span></b>
    </div>

    <div id="regSection">
        <h4 id="formTitle">📝 नवीन पेशंट नोंदणी</h4>
        <input type="hidden" id="editingId">
        <input type="text" id="pName" placeholder="पेशंटचे नाव">
        <input type="number" id="pPhone" placeholder="WhatsApp नंबर">
        <input type="text" id="pAddress" placeholder="पत्ता">
        <div style="display:flex; gap:10px;">
            <input type="date" id="pDate">
            <input type="time" id="pTime">
        </div>
        <textarea id="pNotes" placeholder="तपासणी नोट्स"></textarea>
        <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 डेटा सेव्ह करा</button>
        <button class="btn hidden" id="cancelBtn" onclick="cancelEdit()" style="background:#666; margin-bottom:10px;">रद्द करा</button>
        
        <div style="background:#f1f3f4; padding:10px; border-radius:8px;">
            <b>तारीख:</b> <input type="date" id="listViewDate" onchange="loadAllData()" style="width:60%; margin:0; padding:5px;">
        </div>
        <div id="recentDisplay">लोड होत आहे...</div>
    </div>

    <div id="reminderSection" class="hidden"><h4>🔔 रिमाइन्डर</h4><div id="reminderDisplay"></div></div>
    <div id="broadcastSection" class="hidden"><h4>📢 ब्रॉडकास्ट</h4><textarea id="broadcastMsg" placeholder="मेसेज..."></textarea><div id="masterDisplay"></div></div>

    <div class="nav-bar">
        <div class="nav-item active" id="n1" onclick="switchTab('reg')">नोंदणी</div>
        <div class="nav-item" id="n2" onclick="switchTab('reminder')">रिमाइन्डर</div>
        <div class="nav-item" id="n3" onclick="switchTab('broadcast')">ब्रॉडकास्ट</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpFpSOXAd03QJeFL52ygXU2Q8zQmM2Lyi8699BfyNntljm6aJtHKNg5SPznrwbVDM_/exec";
    let allPatients = [];

    async function loadAllData() {
        const resp = await fetch(`${SCRIPT_URL}?action=get`);
        allPatients = await resp.json();
        const selDate = document.getElementById('listViewDate').value;
        const filtered = allPatients.filter(p => p.date === selDate);
        
        // आजचा काउंट अपडेट
        document.getElementById('todayCount').innerText = filtered.length;

        document.getElementById('recentDisplay').innerHTML = filtered.map((p, index) => `
            <div class="card">
                <span class="token-badge">टोकन: ${index + 1}</span>
                <button class="edit-btn" onclick="editPatient('${p.id}')">✏️ Edit</button><br>
                <b>${p.name}</b><br>
                <small>📞 ${p.phone} | 🕒 ${p.time || '--'}</small>
                <button class="wa-btn" onclick="sendWA('${p.name}','${p.phone}','${p.date}','${p.time}', '${index + 1}')">💬 WhatsApp पाठवा</button>
            </div>
        `).join('') || "डेटा नाही.";
    }

    async function saveData() {
        const name = document.getElementById('pName').value;
        const phone = document.getElementById('pPhone').value;
        if(!name || !phone) return alert("नाव आणि नंबर भरा!");

        const d = {
            action: "save",
            id: document.getElementById('editingId').value || Date.now().toString(),
            name: name, phone: phone, 
            address: document.getElementById('pAddress').value,
            date: document.getElementById('pDate').value,
            time: document.getElementById('pTime').value,
            notes: document.getElementById('pNotes').value,
            userId: "sai@gmail.com"
        };

        document.getElementById('saveBtn').innerText = "सेव्ह होत आहे...";
        await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(d)});
        
        alert("डेटा सेव्ह झाला! ✅");
        loadAllData();
        
        // मेसेज पाठवण्यासाठी कन्फर्मेशन
        if(confirm("पेशंटला टोकन नंबरसह मेसेज पाठवायचा का?")) {
            const token = parseInt(document.getElementById('todayCount').innerText) + 1;
            sendWA(name, phone, d.date, d.time, token);
        }
        cancelEdit();
    }

    function editPatient(id) {
        const p = allPatients.find(x => x.id == id);
        document.getElementById('editingId').value = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPhone').value = p.phone;
        document.getElementById('pAddress').value = p.address;
        document.getElementById('pDate').value = p.date;
        document.getElementById('pTime').value = p.time;
        document.getElementById('pNotes').value = p.notes;
        document.getElementById('formTitle').innerText = "✏️ डेटा सुधारा";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function sendWA(name, phone, date, time, token) {
        const msg = `🏥 *साईदत्त क्लिनिक, सातारा*\n\nनमस्ते *${name}*,\nतुमची नोंदणी झाली आहे.\n✅ *टोकन नंबर: ${token}*\n📅 तारीख: ${date}\n🕒 वेळ: ${time || '--'}\n📍 पत्ता: मार्केट यार्ड, सातारा.`;
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function switchTab(tab) {
        ['regSection', 'reminderSection', 'broadcastSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(tab + 'Section').classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function cancelEdit() {
        document.getElementById('editingId').value = "";
        document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        document.getElementById('formTitle').innerText = "📝 नवीन पेशंट नोंदणी";
        document.getElementById('cancelBtn').classList.add('hidden');
        document.getElementById('pDate').valueAsDate = new Date();
    }

    window.onload = () => {
        document.getElementById('pDate').valueAsDate = new Date();
        document.getElementById('listViewDate').valueAsDate = new Date();
        loadAllData();
    };
</script>
</body>
</html>
